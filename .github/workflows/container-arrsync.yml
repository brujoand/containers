---
name: Build arrsync container

on:
  push:
    branches:
      - main
    paths:
      - arrsync/**

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version
        id: version
        run: echo "version=$(cat arrsync/VERSION)" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: arrsync
          push: true
          tags: |
            ghcr.io/brujoand/arrsync:${{ steps.version.outputs.version }}
            ghcr.io/brujoand/arrsync:latest
